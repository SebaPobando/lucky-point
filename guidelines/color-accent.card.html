<!-- @dsCard group="Colors" viewport="700x150" name="Accents" subtitle="Forest green · ink · Lucky gold" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-raised);font-family:var(--font-body)}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border)}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:0.7rem;color:var(--text-body)}
  .meta b{display:block;font-weight:600;color:var(--text-strong);font-size:0.72rem}
  .meta span{color:var(--text-muted)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--lp-forest)"></div><div class="meta"><b>Forest · accent</b><span>#20392B</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-forest-600)"></div><div class="meta"><b>Forest 600</b><span>#2E5640</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-ink)"></div><div class="meta"><b>Ink</b><span>#17120E</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-gold)"></div><div class="meta"><b>Gold · points</b><span>#C68A2E</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-gold-bg)"></div><div class="meta"><b>Gold bg</b><span>#F6E7C4</span></div></div>
</div>
</body></html>
