<!-- @dsCard group="Colors" viewport="700x150" name="Cream surfaces" subtitle="Page & card backgrounds" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-dark);font-family:var(--font-body)}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid rgba(255,255,255,0.12)}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:0.7rem;background:rgba(0,0,0,0.2)}
  .meta b{display:block;font-weight:600;color:var(--lp-cream-50);font-size:0.72rem}
  .meta span{color:var(--text-on-dark-mut)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--lp-cream-50)"></div><div class="meta"><b>Cream 50</b><span>#FCF8F1</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-cream-100)"></div><div class="meta"><b>Cream 100 · page</b><span>#F7F0E4</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-cream-200)"></div><div class="meta"><b>Cream 200 · sand</b><span>#EFE3D1</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-cream-300)"></div><div class="meta"><b>Cream 300 · foam</b><span>#E4D2B8</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-white)"></div><div class="meta"><b>White · card</b><span>#FFFFFF</span></div></div>
</div>
</body></html>
