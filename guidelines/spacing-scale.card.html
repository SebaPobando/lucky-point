<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="8px base rhythm" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-raised);font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--lp-caramel);border-radius:4px;width:26px}
  .t{font-size:0.7rem;color:var(--text-muted)}
  .t b{display:block;color:var(--text-strong);font-weight:600}
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><div class="t"><b>1</b>4px</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="t"><b>2</b>8px</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="t"><b>3</b>12px</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="t"><b>4</b>16px</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="t"><b>5</b>24px</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="t"><b>6</b>32px</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="t"><b>7</b>48px</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="t"><b>8</b>64px</div></div>
</div>
</body></html>
