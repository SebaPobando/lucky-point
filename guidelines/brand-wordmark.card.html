<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;display:flex;gap:0}
  .panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:230px;text-align:center}
  .light{background:var(--lp-cream-100)}
  .dark{background:var(--lp-espresso)}
  .mark{font-family:var(--font-display);line-height:0.92;letter-spacing:0.04em}
  .mark .l1{font-size:2.4rem;display:block}
  .mark .l2{font-size:2.4rem;display:block}
  .mark .l3{font-size:1rem;letter-spacing:0.42em;font-family:var(--font-body);font-weight:600;margin-top:8px;display:block}
  .on-light .l1,.on-light .l2{color:var(--lp-espresso)}
  .on-light .l3{color:var(--lp-forest)}
  .on-dark .l1,.on-dark .l2{color:var(--lp-cream-50)}
  .on-dark .l3{color:var(--lp-gold-soft)}
</style></head><body>
  <div class="panel light"><div class="mark on-light"><span class="l1">LUCKY</span><span class="l2">POINT</span><span class="l3">COFFEE</span></div></div>
  <div class="panel dark"><div class="mark on-dark"><span class="l1">LUCKY</span><span class="l2">POINT</span><span class="l3">COFFEE</span></div></div>
</body></html>
