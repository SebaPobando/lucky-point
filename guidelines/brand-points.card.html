<!-- @dsCard group="Brand" viewport="700x190" name="Lucky Points motif" subtitle="Gold star token + dual-price rule" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-raised);font-family:var(--font-body);display:flex;gap:28px;align-items:center;flex-wrap:wrap}
  .star{width:54px;height:54px;border-radius:50%;background:var(--lp-gold);color:var(--lp-espresso);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;box-shadow:var(--shadow-sm)}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--lp-gold-bg);color:#8A5E13;font-weight:700;font-size:0.85rem;padding:6px 13px;border-radius:var(--r-pill)}
  .pill .d{width:14px;height:14px;border-radius:50%;background:var(--lp-gold);color:var(--lp-espresso);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900}
  .rule{font-size:0.8rem;color:var(--text-muted);max-width:30ch}
  .rule b{color:var(--text-strong)}
  .price{font-weight:700;font-size:1.25rem;color:var(--text-strong)}
</style></head><body>
  <div class="star">★</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;align-items:center;gap:12px"><span class="price">$3.200</span><span class="pill"><span class="d">★</span>320 pts</span></div>
    <span class="rule"><b>Regla temporal:</b> 10 CLP = 1 Lucky Point. Todo precio se muestra en CLP <b>y</b> en puntos.</span>
  </div>
</body></html>
