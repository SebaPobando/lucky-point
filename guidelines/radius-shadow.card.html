<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & shadow" subtitle="Corner radii and warm shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-raised);font-family:var(--font-body)}
  .grp{display:flex;gap:18px;flex-wrap:wrap}
  .b{width:80px;height:64px;background:var(--lp-white);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:0.65rem;color:var(--text-muted)}
  .sh{width:96px;height:64px;background:var(--lp-white);border-radius:var(--r-md);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:0.65rem;color:var(--text-muted)}
  .lbl{font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);width:100%;margin:0 0 10px}
</style></head><body>
  <div class="lbl">Radius</div>
  <div class="grp" style="margin-bottom:20px">
    <div class="b" style="border-radius:var(--r-xs)">xs 6</div>
    <div class="b" style="border-radius:var(--r-sm)">sm 10</div>
    <div class="b" style="border-radius:var(--r-md)">md 14</div>
    <div class="b" style="border-radius:var(--r-lg)">lg 20</div>
    <div class="b" style="border-radius:var(--r-xl)">xl 28</div>
    <div class="b" style="border-radius:var(--r-pill)">pill</div>
  </div>
  <div class="lbl">Shadow (warm, brown-tinted)</div>
  <div class="grp">
    <div class="sh" style="box-shadow:var(--shadow-xs)">xs</div>
    <div class="sh" style="box-shadow:var(--shadow-sm)">sm</div>
    <div class="sh" style="box-shadow:var(--shadow-md)">md</div>
    <div class="sh" style="box-shadow:var(--shadow-lg)">lg</div>
  </div>
</body></html>
