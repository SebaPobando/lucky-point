<!-- @dsCard group="Colors" viewport="700x150" name="Coffee scale" subtitle="Espresso → latte browns" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-raised);font-family:var(--font-body)}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border)}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:0.7rem;color:var(--text-body)}
  .meta b{display:block;font-weight:600;color:var(--text-strong);font-size:0.72rem}
  .meta span{color:var(--text-muted)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--lp-espresso)"></div><div class="meta"><b>Espresso</b><span>#2A1C12</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-coffee-600)"></div><div class="meta"><b>Coffee 600</b><span>#5A3D27</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-coffee-500)"></div><div class="meta"><b>Coffee 500</b><span>#6F4A30</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-caramel)"></div><div class="meta"><b>Caramel</b><span>#A9764B</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--lp-latte)"></div><div class="meta"><b>Latte</b><span>#C9A57C</span></div></div>
</div>
</body></html>
