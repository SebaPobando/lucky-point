<!-- @dsCard group="Components" viewport="700x340" name="Cards & Badges" subtitle="Surfaces and status pills" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style> body { padding: 28px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, Badge } = window.LuckyPointCoffeeDesignSystem_11711f;
  const H = ({c,children}) => <h3 style={{margin:'0 0 6px',fontFamily:'var(--font-display)',fontSize:'1.3rem',color:c||'var(--text-strong)'}}>{children}</h3>;
  function Demo() {
    return (
      <div>
        <div className="grid">
          <Card variant="plain" interactive><H>Plain</H><span style={{fontSize:'0.85rem',color:'var(--text-muted)'}}>Surface blanca con sombra cálida.</span></Card>
          <Card variant="sand"><H>Sand</H><span style={{fontSize:'0.85rem',color:'var(--text-muted)'}}>Fondo crema para secciones.</span></Card>
          <Card variant="dark"><H c="var(--lp-cream-50)">Espresso</H><span style={{fontSize:'0.85rem',color:'var(--text-on-dark-mut)'}}>Para destacados oscuros.</span></Card>
          <Card variant="forest"><H c="var(--lp-cream-50)">Forest</H><span style={{fontSize:'0.85rem',color:'var(--text-on-dark-mut)'}}>Programa de puntos.</span></Card>
        </div>
        <div className="row">
          <Badge tone="neutral">Sin gluten</Badge>
          <Badge tone="forest">Carta verano</Badge>
          <Badge tone="gold" dot>Lucky Points x2</Badge>
          <Badge tone="dark">Nuevo</Badge>
          <Badge tone="danger">Agotado</Badge>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
